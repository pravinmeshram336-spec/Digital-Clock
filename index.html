<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toolzy - Free Online Digital Clock</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<link rel="icon" type="image/png" href="favicon.png">

</head>

<body>

<nav>

<div class="logo">
<img src="logo.png" alt="Toolzy Logo">
</div>

<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="privacy.html">Privacy</a>
<a href="terms.html">Terms</a>

</nav>

<div class="container">

<div id="clock">00:00:00</div>

<div id="date"></div>

<div>
<label>Clock Color</label><br>
<input type="color" id="clockColor" value="#00ff99">
</div>

<br>

<div>
<label>Background</label><br>
<input type="color" id="bgColor" value="#111111">
</div>

<br>

<div class="buttons">
<button id="themeBtn">Light Mode</button>
<button id="speakBtn">🔊 Speak Time</button>
</div>

<br>

<input type="time" id="alarmTime">

<br>

<div class="buttons">
<button id="setAlarm">Set Alarm</button>
<button id="toggleFormat">24 Hour</button>
</div>

<div id="alarmStatus"></div>

</div>

<footer>

</footer>

<script src="script.js"></script>

</body>

</html>
